{% extends "base.html" %}
{% block title %}Admin Access — Githunguri Law Courts{% endblock %}

{% block content %}
<section class="panel">
  <h2 style="text-align:center;">Admin Access</h2>
  <p class="lede" style="text-align:center;">Enter the staff password to view the attendance register.</p>

  <form class="lock-box" method="POST" action="{{ url_for('admin_login_post') }}">
    <div class="field">
      <label for="fPassword">Password</label>
      <input type="password" id="fPassword" name="password" placeholder="Enter admin password" autofocus>
    </div>
    <button type="submit" class="btn-primary" style="width:100%;">Unlock Register</button>
    <div class="error-msg">{{ error or '' }}</div>
  </form>
</section>
{% endblock %}
